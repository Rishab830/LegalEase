{% extends "base.html" %}

{% block title %}Upload Document - LegalEase{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1>Upload Document</h1>
            <form id="uploadForm" method="POST" action="{{ url_for('main.upload') }}" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="document" class="form-label">Choose document (PDF, PNG, JPG)</label>
                    <input type="file" class="form-control" id="document" name="document" accept="application/pdf,image/png,image/jpeg" required>
                </div>
                <button type="submit" class="btn btn-primary">Upload</button>
            </form>
            <div id="message" class="mt-3"></div>
            <div id="previewContainer" class="mt-4" style="display: none;"></div>
        </div>
    </div>

    <script>
        const allowedExtensions = ['pdf', 'png', 'jpg', 'jpeg'];
        const uploadForm = document.getElementById('uploadForm');
        const documentInput = document.getElementById('document');
        const message = document.getElementById('message');

        function showMessage(text, style) {
            message.innerHTML = `<div class="alert alert-${style}" role="alert">${text}</div>`;
        }

        uploadForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const file = documentInput.files[0];
            if (!file) {
                showMessage('Please select a file.', 'danger');
                return;
            }

            const ext = file.name.split('.').pop().toLowerCase();
            if (!allowedExtensions.includes(ext)) {
                showMessage('Invalid file type. Only PDF, PNG, JPG are allowed.', 'danger');
                return;
            }

            const formData = new FormData();
            formData.append('document', file);

            try {
                const res = await fetch("{{ url_for('main.upload') }}", {
                    method: 'POST',
                    body: formData
                });

                const resJson = await res.json();
                if (res.ok && resJson.success) {
                    showMessage(`
                        <strong>Upload successful!</strong> Your document is being analyzed in the background.<br>
                        <a href="{{ url_for('main.documents') }}" class="btn btn-sm btn-success mt-2">View in Document History</a>
                    `, 'success');
                    
                    // Display preview
                    const previewContainer = document.getElementById('previewContainer');
                    previewContainer.style.display = 'block';
                    
                    // Generate base URL via url_for, and append filename
                    const baseUrl = "{{ url_for('main.get_uploaded_file', filename='PLACEHOLDER') }}".replace('PLACEHOLDER', '');
                    const fileUrl = baseUrl + resJson.filename;
                    
                    if (resJson.ext === 'pdf') {
                        previewContainer.innerHTML = `
                            <div class="card border-primary shadow-sm mb-4">
                                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                                    <strong>PDF Preview</strong>
                                    <button class="btn btn-sm btn-light" onclick="window.open('${fileUrl}', '_blank')">View Full Screen</button>
                                </div>
                                <div class="card-body p-0">
                                    <embed src="${fileUrl}" type="application/pdf" width="100%" height="500px" style="display: block; border: none;" />
                                </div>
                            </div>
                        `;
                    } else {
                        previewContainer.innerHTML = `
                            <div class="card border-primary shadow-sm mb-4">
                                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                                    <strong>Image Preview</strong>
                                    <button class="btn btn-sm btn-light" onclick="window.open('${fileUrl}', '_blank')">View Full Size</button>
                                </div>
                                <div class="card-body text-center p-0 bg-light">
                                    <img src="${fileUrl}" alt="Document Preview" style="max-width: 100%; max-height: 500px; object-fit: contain;">
                                </div>
                            </div>
                        `;
                    }
                    
                } else {
                    showMessage(resJson.message || 'Upload failed.', 'danger');
                }
            } catch (err) {
                showMessage('Upload error. Please try again.', 'danger');
            }
        });
    </script>
{% endblock %}
