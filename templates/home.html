{% extends "base.html" %}

{% block title %}Home - {{ project_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <h1>Welcome to {{ project_name }}</h1>
        <p class="lead">Your AI-powered legal document analysis platform</p>
        <div class="mt-4">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-lg">Go to Dashboard</a>
            {% else %}
                <a href="{{ url_for('auth.register') }}" class="btn btn-primary btn-lg me-3">Get Started</a>
                <a href="{{ url_for('auth.login') }}" class="btn btn-outline-primary btn-lg">Login</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
